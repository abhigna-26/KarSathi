<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KarSathi CA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* BASE STYLES & VARIABLES */
:root {
  --bg-base: transparent;
  --bg-surface: rgba(20, 20, 20, 0.95);
  --bg-hover: rgba(40, 40, 40, 0.8);
  --bg-sidebar: rgba(10, 10, 10, 0.98);
  --border-subtle: rgba(255, 255, 255, 0.08);
  --text-primary: #F4F4F5;
  --text-sec: #A1A1AA;
  --text-muted: #71717A;
  
  --c-green: #10B981;
  --bg-green: rgba(16, 185, 129, 0.15);
  --c-amber: #F59E0B;
  --bg-amber: rgba(245, 158, 11, 0.15);
  --c-red: #EF4444;
  --bg-red: rgba(239, 68, 68, 0.15);
  --c-brand: #E4E4E7;
  
  --font-main: 'Inter', sans-serif;
  --br-card: 12px;
  --br-pill: 9999px;
  --tr-fast: 0.15s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-main);
  background: var(--bg-base);
  color: var(--text-primary);
  font-size: 14px;
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}

/* LAYOUT */
.app-container {
  display: flex;
  height: 100vh;
  overflow: hidden;
  position: relative;
  background-color: var(--bg-sidebar); /* Fallback */
}

.sidebar {
  width: 250px;
  background-color: var(--bg-sidebar);
  border-right: 0.5px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  flex-shrink: 0;
  transition: transform 0.3s ease;
}

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  background-color: #0A0A0A;
  padding: 32px;
}

@media (max-width: 768px) {
  .sidebar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    z-index: 100;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .main-content { padding: 16px; }
  .mobile-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
  }
  .mobile-overlay.active { display: block; }
  .mobile-header {
    display: flex !important;
  }
}

/* TYPOGRAPHY */
h1 { font-size: 24px; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.5px; }
h2 { font-size: 16px; font-weight: 500; margin-bottom: 16px; color: var(--text-primary); }
.text-xs { font-size: 12px; color: var(--text-sec); }
.metric-value { font-size: 24px; font-weight: 600; margin-top: 8px; font-family: var(--font-main); }
.text-green { color: var(--c-green); }
.text-amber { color: var(--c-amber); }
.text-red { color: var(--c-red); }

/* COMPONENTS */
.brand {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 32px;
  padding-left: 8px;
  background: linear-gradient(135deg, #FFF 0%, #A1A1AA 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: flex;
  align-items: center;
  gap: 8px;
}
.brand::before {
  content: '';
  display: block;
  width: 12px;
  height: 12px;
  background: var(--c-green);
  border-radius: var(--br-pill);
  box-shadow: 0 0 10px var(--c-green);
}

.nav-item {
  padding: 10px 12px;
  margin-bottom: 4px;
  border-radius: 8px;
  color: var(--text-sec);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 500;
  transition: all var(--tr-fast);
}
.nav-item:hover, .nav-item.active {
  background-color: var(--bg-surface);
  color: var(--text-primary);
}

.card {
  background-color: var(--bg-surface);
  border: 0.5px solid var(--border-subtle);
  border-radius: var(--br-card);
  padding: 20px;
  transition: transform var(--tr-fast), border-color var(--tr-fast);
}
.card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.15);
}

.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-gap { display: flex; gap: 12px; align-items: center; }

.badge {
  padding: 4px 8px;
  border-radius: var(--br-pill);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge.green { background: var(--bg-green); color: var(--c-green); }
.badge.amber { background: var(--bg-amber); color: var(--c-amber); }
.badge.red { background: var(--bg-red); color: var(--c-red); }

.btn {
  background: var(--bg-hover);
  color: var(--text-primary);
  border: 0.5px solid var(--border-subtle);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--tr-fast);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn:hover { background: rgba(255,255,255,0.1); }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--text-primary); color: #000; border: none; }
.btn-primary:hover { background: #E4E4E7; }
.btn-icon { padding: 6px 10px; }

/* PROGRESS BAR */
.progress-bg {
  width: 100%;
  height: 6px;
  background: var(--bg-hover);
  border-radius: 4px;
  margin-top: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

/* TABLE */
.table-wrapper {
  background: var(--bg-surface);
  border: 0.5px solid var(--border-subtle);
  border-radius: var(--br-card);
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; text-align: left; }
th, td { padding: 14px 20px; border-bottom: 0.5px solid var(--border-subtle); }
th { font-size: 12px; color: var(--text-sec); font-weight: 500; }
tr:hover td { background: var(--bg-hover); }
tr:last-child td { border-bottom: none; }

/* CHAT UI */
.chat-container { display: flex; flex-direction: column; height: 500px; }
.chat-history { flex: 1; overflow-y: auto; padding-right: 12px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
.msg.user { align-self: flex-end; background: var(--bg-hover); border-top-right-radius: 4px; }
.msg.ai { align-self: flex-start; background: var(--bg-surface); border: 0.5px solid var(--border-subtle); border-top-left-radius: 4px; }
.chat-input-area { display: flex; gap: 12px; margin-top: 16px; }
.chat-input { flex: 1; background: var(--bg-surface); border: 0.5px solid var(--border-subtle); border-radius: 8px; padding: 12px 16px; color: var(--text-primary); outline: none; }
.chat-input:focus { border-color: var(--text-sec); }
.chip { padding: 6px 12px; background: var(--bg-hover); border: 0.5px solid var(--border-subtle); border-radius: var(--br-pill); font-size: 12px; cursor: pointer; white-space: nowrap; transition: var(--tr-fast); }
.chip:hover { background: rgba(255,255,255,0.1); }
.chip-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }

/* TABS */
.tabs { display: flex; gap: 24px; border-bottom: 0.5px solid var(--border-subtle); margin-bottom: 24px; }
.tab { padding: 12px 0; color: var(--text-sec); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 500; transition: var(--tr-fast); }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }

/* URGENT BANNER */
.urgent-banner {
  background: var(--bg-red);
  border: 0.5px solid rgba(239, 68, 68, 0.3);
  padding: 12px 20px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

/* UTILS */
.hidden { display: none !important; }
.text-right { text-align: right; }
.mobile-header { display: none; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.menu-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--bg-surface);
  border: 0.5px solid var(--border-subtle);
  padding: 12px 20px;
  border-radius: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 1000;
  display: flex; align-items: center; gap: 12px;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* TREND CHART (CSS Only) */
.chart-bar-container { display: flex; align-items: flex-end; gap: 8px; height: 100px; margin-top: 16px; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.chart-bar { width: 100%; background: var(--bg-hover); border-radius: 4px; position: relative; overflow: hidden; height: 100%; display: flex; align-items: flex-end; }
.chart-bar-fill { width: 100%; background: var(--text-sec); border-radius: 4px; transition: height 1s ease; }
.chart-bar-fill.high { background: var(--c-green); }
.chart-bar-fill.mid { background: var(--c-amber); }
.chart-bar-fill.low { background: var(--c-red); }

</style>
</head>
<body>

<div class="app-container" id="app">
  <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>
  
  <nav class="sidebar" id="sidebar">
    <div class="brand">KarSathi</div>
    
    <div class="nav-item active" onclick="navigate('overview', this)">
      <span>⊞</span> Overview
    </div>
    <div class="nav-item" onclick="navigate('clients', this)">
      <span>👥</span> Clients
    </div>
    <div class="nav-item" onclick="navigate('gst', this)">
      <span>📄</span> GST Centre
    </div>
    <div class="nav-item" onclick="navigate('deadlines', this)">
      <span>📅</span> Deadlines
    </div>
    <div class="nav-item" onclick="navigate('alerts', this)">
      <span>🔔</span> Alerts
    </div>
    <div class="nav-item" onclick="navigate('ai', this)">
      <span>✨</span> AI Assistant
    </div>
    <div class="nav-item" onclick="navigate('analytics', this)">
      <span>📊</span> Analytics
    </div>
    
    <div style="margin-top: auto;">
      <div class="card" style="padding: 12px; background: rgba(255,255,255,0.03);">
        <div class="text-xs">Live Status</div>
        <div class="flex-between" style="margin-top: 4px;">
          <span style="font-size: 13px;">WhatsApp Bot</span>
          <span style="color:var(--c-green); font-size: 10px;">● Online</span>
        </div>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="mobile-header">
      <div class="brand" style="margin: 0;">KarSathi</div>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </div>
    
    <!-- Dynamic Content Area -->
    <div id="content-area"></div>
  </main>
</div>

<div class="toast" id="toast">
  <span style="color: var(--c-green);">✓</span>
  <span id="toast-msg">Action completed</span>
</div>

<script>
/* =========================================================
   MOCK DATA
   ========================================================= */
const state = {
  activeTab: 'overview',
  activeGstTab: 'pending'
};

const clients = [
  { id: 1, name: "Verma Traders", gstin: "07AAACV1234D1Z5", state: "Delhi", type: "Textile", emp: 4, compliance: 68, gst: "Due in 2 days", status: 'amber', lastAct: "2h ago" },
  { id: 2, name: "Gupta Electronics", gstin: "27AAACG5678E1Z9", state: "Maharashtra", type: "Retail", emp: 12, compliance: 95, gst: "All filed", status: 'green', lastAct: "1d ago" },
  { id: 3, name: "Patel Fabrics", gstin: "24AAACP9012F1Z2", state: "Gujarat", type: "Mfg", emp: 28, compliance: 42, gst: "Overdue", status: 'red', lastAct: "5d ago" },
  { id: 4, name: "Singh Auto Works", gstin: "06AAACS3456G1Z7", state: "Haryana", type: "Service", emp: 8, compliance: 55, gst: "PF pending", status: 'amber', lastAct: "12h ago" },
  { id: 5, name: "Mehra & Sons", gstin: "08AAACM7890H1Z4", state: "Rajasthan", type: "Wholesale", emp: 6, compliance: 88, gst: "All clear", status: 'green', lastAct: "3d ago" }
];

const deadlines = [
  { id: 1, name: "GSTR-3B", client: "3 clients pending", date: "Apr 20", fine: "₹50/day", urgency: 'urgent', days: 2 },
  { id: 2, name: "PF Deposit", client: "Singh Auto", date: "Apr 15", fine: "Interest + Damages", urgency: 'urgent', days: -3 },
  { id: 3, name: "TDS", client: "Mehra & Sons", date: "Apr 17", fine: "₹200/day", urgency: 'soon', days: -1 },
  { id: 4, name: "ESI Return", client: "Gupta Electronics", date: "Apr 21", fine: "12% Interest", urgency: 'soon', days: 3 },
  { id: 5, name: "GSTR-1", client: "All Clients", date: "Apr 25", fine: "₹50/day", urgency: 'later', days: 7 }
];

const alerts = [
  { type: 'danger', client: "Patel Fabrics", issue: "GSTR-1 Missed Deadline", time: "2 hours ago" },
  { type: 'warning', client: "Verma Traders", issue: "GST Liability Mismatch (₹12,400)", time: "5 hours ago" },
  { type: 'info', client: "System", issue: "KarSathi AI learned 14 new tax rules", time: "1 day ago" },
  { type: 'read', client: "Gupta Electronics", issue: "PF Successfully Deposited", time: "2 days ago" }
];

/* =========================================================
   CORE FUNCTIONS
   ========================================================= */

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-msg').innerText = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('active');
}

function navigate(view, el) {
  if (el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  }
  state.activeTab = view;
  if(window.innerWidth <= 768) toggleSidebar();
  render();
}

function sendWA(clientName) {
  showToast(`WhatsApp reminder sent to ${clientName}`);
}

function getStatusColor(status) {
  if (status === 'green') return 'var(--c-green)';
  if (status === 'amber') return 'var(--c-amber)';
  return 'var(--c-red)';
}

function renderProgressBar(percentage, status) {
  let colorClass = status === 'green' ? 'high' : (status === 'amber' ? 'mid' : 'low');
  let bgCol = getStatusColor(status);
  return `
    <div style="display:flex; align-items:center; gap:8px;">
      <div class="progress-bg" style="flex:1;">
        <div class="progress-fill" style="width: ${percentage}%; background: ${bgCol};"></div>
      </div>
      <span class="text-xs">${percentage}%</span>
    </div>
  `;
}

/* =========================================================
   VIEWS
   ========================================================= */

const views = {
  overview: () => `
    <h1>Dashboard Overview</h1>
    
    <div class="urgent-banner">
      <div class="flex-gap">
        <span style="font-size:20px;">⚠️</span>
        <div>
          <div style="font-weight:600; color:var(--text-primary);">Action Required: 3 Clients have GST deadlines in < 3 days.</div>
          <div class="text-xs" style="color:rgba(255,255,255,0.7);">Affects Verma Traders, Singh Auto, and 1 other.</div>
        </div>
      </div>
      <button class="btn" style="border-color: rgba(255,255,255,0.3);" onclick="navigate('deadlines')">View Deadlines</button>
    </div>

    <div class="grid-4">
      <div class="card">
        <div class="text-xs">Total Clients</div>
        <div class="metric-value">14</div>
      </div>
      <div class="card">
        <div class="text-xs">Compliance Rate</div>
        <div class="metric-value text-green">79%</div>
      </div>
      <div class="card">
        <div class="text-xs">Pending Filings</div>
        <div class="metric-value text-amber">7</div>
      </div>
      <div class="card">
        <div class="text-xs">WA Alerts Sent (Wk)</div>
        <div class="metric-value">38</div>
      </div>
    </div>

    <div class="grid-3" style="grid-template-columns: 1.5fr 1fr;">
      <div class="card">
        <div class="flex-between">
          <h2>Client Health Snapshot</h2>
          <button class="btn btn-icon" onclick="navigate('clients')">View All</button>
        </div>
        <div style="margin-top: 16px;">
          ${clients.slice(0,4).map(c => `
            <div class="flex-between" style="padding: 12px 0; border-bottom: 0.5px solid var(--border-subtle);">
              <div>
                <div style="font-weight:500;">${c.name}</div>
                <div class="text-xs">${c.gst}</div>
              </div>
              <div style="width: 100px;">
                ${renderProgressBar(c.compliance, c.status)}
              </div>
              <button class="btn btn-icon" onclick="sendWA('${c.name}')">WA</button>
            </div>
          `).join('')}
        </div>
      </div>
      
      <div class="card">
        <h2>Compliance Trend (6m)</h2>
        <div class="text-xs">Average score across all MSMEs</div>
        <div class="chart-bar-container">
          ${[58, 65, 72, 68, 75, 79].map(val => {
            let cl = val > 70 ? 'high' : (val > 60 ? 'mid' : 'low');
            return `
              <div class="chart-bar-wrap">
                <div class="chart-bar">
                  <div class="chart-bar-fill ${cl}" style="height: ${val}%"></div>
                </div>
                <div class="text-xs" style="font-size:10px;">${val}%</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>
  `,

  clients: () => `
    <div class="flex-between" style="margin-bottom:24px;">
      <h1>Client Manager</h1>
      <button class="btn btn-primary" onclick="showToast('Add Client clicked')">+ Add Client</button>
    </div>
    
    <div class="card" style="padding:0;">
      <div style="padding: 16px; border-bottom: 0.5px solid var(--border-subtle); display:flex; gap:12px;">
        <input type="text" class="chat-input" placeholder="Search clients, GSTIN..." style="max-width: 300px; padding: 8px 12px;">
        <button class="btn">Filter</button>
      </div>
      <div class="table-wrapper" style="border:none;">
        <table>
          <thead>
            <tr>
              <th>Client Name / GSTIN</th>
              <th>State / Type</th>
              <th>Compliance %</th>
              <th>Status</th>
              <th>Last Act.</th>
              <th class="text-right">Action</th>
            </tr>
          </thead>
          <tbody>
            ${clients.map(c => `
              <tr>
                <td>
                  <div style="font-weight:500;">${c.name}</div>
                  <div class="text-xs">${c.gstin}</div>
                </td>
                <td>
                  <div>${c.state}</div>
                  <div class="text-xs">${c.type} (${c.emp} emp)</div>
                </td>
                <td style="width:150px;">
                  ${renderProgressBar(c.compliance, c.status)}
                </td>
                <td><span class="badge ${c.status}">${c.gst}</span></td>
                <td class="text-xs">${c.lastAct}</td>
                <td class="text-right">
                  <button class="btn" onclick="sendWA('${c.name}')">Remind</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `,

  gst: () => {
    let t = state.activeGstTab;
    return `
      <h1>GST Filings Centre</h1>
      
      <div class="tabs">
        <div class="tab ${t==='pending'?'active':''}" onclick="state.activeGstTab='pending'; render()">Pending (3)</div>
        <div class="tab ${t==='filed'?'active':''}" onclick="state.activeGstTab='filed'; render()">Filed (11)</div>
        <div class="tab ${t==='overdue'?'active':''}" onclick="state.activeGstTab='overdue'; render()">Overdue (1)</div>
      </div>
      
      <div class="flex-between" style="margin-bottom: 16px;">
        <div class="flex-gap">
          <input type="checkbox" id="bulk" class="chat-input" style="width: auto; padding:0; accent-color: var(--c-brand);">
          <label for="bulk" class="text-xs">Select All</label>
        </div>
        <button class="btn" onclick="showToast('Bulk reminders sent via WhatsApp')">Bulk Remind</button>
      </div>

      <div class="grid-3" style="grid-template-columns: 1fr;">
        ${t === 'pending' ? clients.filter(c=>c.status==='amber').map(c => `
          <div class="card flex-between">
            <div>
              <div style="font-weight: 500;">${c.name}</div>
              <div class="text-xs">GSTR-3B • Due in 2 Days • Turnover: ₹12.5L</div>
            </div>
            <div class="flex-gap">
              <span class="badge amber">Pending</span>
              <button class="btn" onclick="sendWA('${c.name}')">Send WA</button>
            </div>
          </div>
        `).join('') : ''}
        ${t === 'filed' ? '<div class="text-muted" style="padding: 40px; text-align:center;">All filed records show here.</div>' : ''}
        ${t === 'overdue' ? clients.filter(c=>c.status==='red').map(c => `
          <div class="card flex-between" style="border-color: rgba(239,68,68,0.3);">
            <div>
              <div style="font-weight: 500;">${c.name}</div>
              <div class="text-xs">GSTR-1 • Overdue by 5 Days • Tax: ₹4,200</div>
            </div>
            <div class="flex-gap">
              <span class="badge red">Overdue</span>
              <button class="btn" onclick="sendWA('${c.name}')">Escalate</button>
            </div>
          </div>
        `).join('') : ''}
      </div>
    `
  },

  deadlines: () => `
    <h1>Deadline Calendar</h1>
    
    <div class="grid-3">
      <div class="card" style="background: rgba(239,68,68,0.05); border-top: 2px solid var(--c-red);">
        <h2 class="text-red">Urgent (< 3 days)</h2>
        ${deadlines.filter(d=>d.urgency==='urgent').map(d=>`
          <div style="padding: 12px; background:var(--bg-surface); border-radius:8px; margin-bottom:8px; border:0.5px solid var(--border-subtle);">
            <div class="flex-between" style="margin-bottom:4px;">
              <span style="font-weight:500;">${d.name}</span>
              <span class="text-xs">${d.date}</span>
            </div>
            <div class="text-xs" style="color:var(--text-primary);">${d.client}</div>
            <div class="text-xs text-red" style="margin-top:4px;">Risk: ${d.fine}</div>
          </div>
        `).join('')}
      </div>
      
      <div class="card" style="background: rgba(245,158,11,0.05); border-top: 2px solid var(--c-amber);">
        <h2 class="text-amber">Soon (4-14 days)</h2>
        ${deadlines.filter(d=>d.urgency==='soon').map(d=>`
          <div style="padding: 12px; background:var(--bg-surface); border-radius:8px; margin-bottom:8px; border:0.5px solid var(--border-subtle);">
            <div class="flex-between" style="margin-bottom:4px;">
              <span style="font-weight:500;">${d.name}</span>
              <span class="text-xs">${d.date}</span>
            </div>
            <div class="text-xs" style="color:var(--text-primary);">${d.client}</div>
          </div>
        `).join('')}
      </div>
      
      <div class="card" style="border-top: 2px solid var(--c-green);">
        <h2 class="text-green">Later (15+ days)</h2>
        ${deadlines.filter(d=>d.urgency==='later').map(d=>`
          <div style="padding: 12px; background:var(--bg-surface); border-radius:8px; margin-bottom:8px; border:0.5px solid var(--border-subtle);">
            <div class="flex-between" style="margin-bottom:4px;">
              <span style="font-weight:500;">${d.name}</span>
              <span class="text-xs">${d.date}</span>
            </div>
            <div class="text-xs" style="color:var(--text-primary);">${d.client}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `,

  alerts: () => `
    <div class="flex-between" style="margin-bottom:24px;">
      <h1>System Alerts</h1>
      <button class="btn" onclick="showToast('All marked as read')">Mark All Read</button>
    </div>
    
    <div class="card" style="padding:0;">
      ${alerts.map((a, i) => {
        let bClass = a.type === 'danger' ? 'red' : (a.type === 'warning' ? 'amber' : (a.type === 'info' ? 'green' : ''));
        let bText = a.type.toUpperCase();
        let opacity = a.type === 'read' ? '0.6' : '1';
        return `
        <div class="flex-between" style="padding: 16px 20px; border-bottom: ${i!==alerts.length-1?'0.5px solid var(--border-subtle)':'none'}; opacity: ${opacity};">
          <div class="flex-gap">
            <span class="badge ${bClass}">${bText || 'READ'}</span>
            <div>
              <div style="font-weight:500;">${a.issue}</div>
              <div class="text-xs">${a.client} • ${a.time}</div>
            </div>
          </div>
          ${a.type !== 'read' ? `<button class="btn" onclick="showToast('Viewing details')">Resolve</button>` : ''}
        </div>
      `}).join('')}
    </div>
  `,

  ai: () => `
    <h1>KarSathi AI Assistant</h1>
    
    <div class="grid-3" style="grid-template-columns: 2fr 1fr;">
      <div class="card" style="padding:0; display:flex; flex-direction:column; background:#000;">
        <div style="padding:16px; border-bottom:0.5px solid var(--border-subtle);">
          <div class="chip-row">
            <div class="chip" onclick="fillChat('GST kab file karein?')">GST kab file karein?</div>
            <div class="chip" onclick="fillChat('Patel Fabrics PF compliance status?')">PF Status (Patel)</div>
            <div class="chip" onclick="fillChat('FSSAI license renewal rules')">FSSAI rules</div>
            <div class="chip" onclick="fillChat('Generate TDS report for Mehra')">TDS Report</div>
          </div>
        </div>
        
        <div class="chat-container">
          <div class="chat-history" id="chat-history" style="padding:16px;">
            <div class="msg ai">Namaste! I am the KarSathi AI. How can I assist you with your MSME clients today?</div>
          </div>
          
          <div style="padding:16px; border-top:0.5px solid var(--border-subtle);">
            <div class="chat-input-area" style="margin:0;">
              <input type="text" id="ai-input" class="chat-input" placeholder="Type message in English or Hindi..." onkeypress="handleChat(event)">
              <button class="btn btn-primary" onclick="sendChat()">Send</button>
            </div>
          </div>
        </div>
      </div>
      
      <div>
        <div class="card" style="margin-bottom: 16px;">
          <h2>Bot Status</h2>
          <div class="flex-between" style="margin-bottom:8px;"><span class="text-xs">Queries Today</span><span style="font-weight:600;">142</span></div>
          <div class="flex-between" style="margin-bottom:8px;"><span class="text-xs">Active Clients</span><span style="font-weight:600;">11/14</span></div>
          <div class="flex-between"><span class="text-xs">Avg Response</span><span style="font-weight:600;">1.2s</span></div>
        </div>
        
        <div class="card" style="border-color: rgba(245,158,11,0.3);">
          <h2 class="text-amber">Escalations (CA Review)</h2>
          <div class="text-xs" style="margin-bottom:12px;">Queries bot couldn't answer confidently (< 0.60).</div>
          
          <div style="padding:12px; background:var(--bg-hover); border-radius:8px; margin-bottom:8px;">
            <div class="text-xs">Verma Traders</div>
            <div style="font-size:13px; margin:4px 0;">"Sir eway bill block ho gaya hai kya karu?"</div>
            <button class="btn" style="width:100%; justify-content:center; margin-top:8px;" onclick="showToast('Review opened')">Review & Respond</button>
          </div>
        </div>
      </div>
    </div>
  `,

  analytics: () => `
    <h1>Analytics & Insights</h1>
    
    <div class="grid-4" style="grid-template-columns: repeat(3, 1fr);">
      <div class="card">
        <div class="text-xs">Late Fees Saved (Est.)</div>
        <div class="metric-value text-green">₹84,000</div>
      </div>
      <div class="card">
        <div class="text-xs">AI Resolution Accuracy</div>
        <div class="metric-value">97.2%</div>
      </div>
      <div class="card">
        <div class="text-xs">MSME Revenue Tracked</div>
        <div class="metric-value">₹2.1Cr</div>
      </div>
    </div>

    <div class="grid-3" style="grid-template-columns: 1fr 1fr;">
      <div class="card">
        <h2>Top Compliance Fall-off Reasons</h2>
        <div class="text-xs" style="margin-bottom: 16px;">Why clients miss deadlines</div>
        
        ${[
          {r: 'Working Capital Shortage', p: 45},
          {r: 'Missing Purchase Bills', p: 30},
          {r: 'Portal Outage', p: 15},
          {r: 'CA Delay (Awaiting doc)', p: 10}
        ].map(item => `
          <div style="margin-bottom:12px;">
            <div class="flex-between text-xs" style="margin-bottom:4px;">
              <span>${item.r}</span>
              <span>${item.p}%</span>
            </div>
            <div class="progress-bg"><div class="progress-fill high" style="width:${item.p}%"></div></div>
          </div>
        `).join('')}
      </div>

      <div class="card">
        <h2>Most Asked AI Queries</h2>
        <div class="text-xs" style="margin-bottom: 16px;">What business owners ask the bot</div>
        
        <div style="display:flex; flex-direction:column; gap:12px;">
          <div class="flex-between"><span>1. GST Filing Dates</span> <span class="badge">40%</span></div>
          <div class="flex-between"><span>2. Input Tax Credit (ITC) Rules</span> <span class="badge">25%</span></div>
          <div class="flex-between"><span>3. Labour Law / PF</span> <span class="badge">20%</span></div>
          <div class="flex-between"><span>4. e-Way Bill Errors</span> <span class="badge">15%</span></div>
        </div>
      </div>
    </div>
  `
};

/* =========================================================
   ROUTER & RENDER
   ========================================================= */

function render() {
  const content = document.getElementById('content-area');
  content.style.opacity = '0';
  
  setTimeout(() => {
    content.innerHTML = views[state.activeTab]();
    content.style.opacity = '1';
    content.style.transition = 'opacity 0.2s';
    
    // trigger animations
    setTimeout(() => {
      document.querySelectorAll('.progress-fill').forEach(el => {
        const w = el.style.width;
        el.style.width = '0';
        setTimeout(() => el.style.width = w, 50);
      });
      document.querySelectorAll('.chart-bar-fill').forEach(el => {
        const h = el.style.height;
        el.style.height = '0';
        setTimeout(() => el.style.height = h, 50);
      });
    }, 100);

  }, 150);
}

/* =========================================================
   CHAT LOGIC
   ========================================================= */

function fillChat(text) {
  const input = document.getElementById('ai-input');
  if(input) {
    input.value = text;
    input.focus();
  }
}

function handleChat(e) {
  if(e.key === 'Enter') sendChat();
}

function sendChat() {
  const input = document.getElementById('ai-input');
  const text = input.value.trim();
  if(!text) return;
  
  const history = document.getElementById('chat-history');
  
  // User msg
  history.innerHTML += `<div class="msg user">${text}</div>`;
  input.value = '';
  history.scrollTop = history.scrollHeight;
  
  // AI Mock Reply
  setTimeout(() => {
    let reply = "I'm checking the compliance data for you... All seems up to date. Need help with anything else?";
    if(text.toLowerCase().includes('gst')) reply = "GST (GSTR-3B) dates for this month are 20th. I can send a broadcast reminder to 3 pending clients. Should I?";
    if(text.toLowerCase().includes('pf')) reply = "PF contributions must be deposited by the 15th. Patel Fabrics is currently at 42% compliance, shall I escalate to the owner?";
    
    history.innerHTML += `<div class="msg ai">${reply}</div>`;
    history.scrollTop = history.scrollHeight;
  }, 1000);
}

// Initial render
window.onload = () => render();

</script>
</body>
</html>
